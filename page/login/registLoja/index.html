<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
        integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./regist.css">
    <title>Registrar - Loja</title>
</head>

<body>

    <div class="box-title">
        <h1 class="title">Enviar para o <span>Whatsapp</span></h1>
        <p class="info-title">
            Preencha as informações abaixo e
            envie sua mensagem direto para o whatsapp.
        </p>
    </div>

    <form id="form">

        <div class="box-input">
            <input class="campo" placeholder="Ex: João Silva">
            <span class="erro-input"></span>
        </div>

        <div class="box-textArea">
            <textarea id="textArea" rows="4" placeholder="Digite sua mensagem aqui..."></textarea>
            <span class="erro-textArea"></span>
        </div>

        <div class="box-garantia">
            <img src="./img/escudo.png" alt="Icone escudo">
            <div class="box-info">
                <h3>Privacidade e segurança</h3>
                <p>Sua mensagem será enviada diretamente pelo whatsapp. Não armazenamos seus dados.</p>
            </div>
            <img src="./img/certificado.png" alt="Icone certificado">
        </div>

        <button type="submit" class="btn-zap">
            <img src="./img/whatsapp.png" alt="Icone whatsapp">
            Enviar parawhatsapp
        </button>

    </form>

    <div class="box-priv">
        <img src="./img/cadeado.png" alt="Icone cadeado">
        <span>Seguro - Rápido - Direto</span>
    </div>

    <div class="box-dev">
        <p>©2026 - desenvolvido por <span>DiegoDEV</span></p>
    </div>


    <script src="./zap.js" defer></script>
</body>

</html>
