<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./login.css">
  <link rel="icon" href="../../src/img/AUG.png" type="image/png">
  <title>AUG — Login</title>
</head>

<body>

  <div class="login-box">

    <div class="box-title">
      <img class="logo" src="../../src/img/logoaugoficial.png" alt="Logo Aug Financeira">
      <h1 class="title">AUG Financeira</h1>
      <p class="sub-title">Acesse sua conta agora!</p>
    </div>

    <div class="box-campos">

      <input type="text" id="nomeUsuario" required>
      <label class="dg-nome" for="nomeUsuario">Digite seu nome</label>

      <input type="text" id="siglaLoja" required>
      <label class="sg-loja" for="siglaLoja">Sigla da loja (ex: AUG)</label>
      <label class="erro-sigla"></label>

      <input type="password" id="senhaLogin" required>
      <label class="sg-senha" for="senhaLogin">Senha da loja</label>

      <button id="btnEntrar">Entrar</button>

      <div class="box-button-loja">
        <a href="./registLoja/index.html" class="btn-loja">Registra-se agora</a>
      </div>

    </div>

  </div>

  <div class="box-dev">
    <p>©2026 - Desenvolvido por DiegoDEV</p>
  </div>

  <p id="erroLogin" class="erro"></p>

  <audio class="vozErroCampo" src="../../src/audio/erroCampo.mp3"></audio>
  <audio class="vozErroSigla" src="../../src/audio/erroSigla.mp3"></audio>
  <audio class="vozErroLoja" src="../../src/audio/erroLoja.mp3"></audio>

  <script type="module" src="../../src/js/login.js"></script>
</body>

</html>
