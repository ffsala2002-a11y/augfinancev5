<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>AUG — Importador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="../../src/img/AUG.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #080b12;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --gold: #c9a84c;
      --gold2: #f0d080;
      --gold-glow: rgba(201, 168, 76, 0.2);
      --red: #e05555;
      --green: #4caf7d;
      --blue: #4c8fe0;
      --text: #f0f0f0;
      --muted: #6b7280;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 50% at 50% 0%, rgba(201, 168, 76, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 10% 100%, rgba(76, 143, 224, 0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== TOPO ===== */
    .topo {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(8, 11, 18, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topo-brand {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topo-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: block;
      margin-top: 1px;
    }

    .topo-loja-badge {
      background: rgba(76, 175, 125, 0.1);
      border: 1px solid rgba(76, 175, 125, 0.3);
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
      display: none;
    }

    /* ===== CONTEÚDO ===== */
    .content {
      padding: 24px 16px 48px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
    }

    .card-titulo {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ===== INPUTS ===== */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"] {
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--muted);
      letter-spacing: 0.5px;
      font-weight: 400;
      text-transform: none;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    /* ===== BOTÕES ===== */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0d0d0d;
      box-shadow: 0 4px 16px var(--gold-glow);
    }

    .btn-green {
      background: rgba(76, 175, 125, 0.15);
      border: 1px solid rgba(76, 175, 125, 0.3);
      color: var(--green);
    }

    .btn-danger {
      background: rgba(224, 85, 85, 0.1);
      border: 1px solid rgba(224, 85, 85, 0.25);
      color: var(--red);
    }

    /* ===== LOJA INFO ===== */
    .loja-info {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(76, 175, 125, 0.08);
      border: 1px solid rgba(76, 175, 125, 0.2);
      border-radius: 12px;
    }

    .loja-info.visivel { display: flex; }
    .loja-info-icon { font-size: 28px; flex-shrink: 0; }

    .loja-info-nome {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    .loja-info-sigla {
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* ===== UPLOAD ===== */
    .upload-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .upload-item {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 18px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-item:active {
      border-color: var(--gold);
      background: var(--gold-glow);
    }

    .upload-item input[type="file"] { display: none; }

    .upload-item label {
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      line-height: 1.3;
    }

    .upload-icon { font-size: 24px; }

    .upload-item.has-file {
      border-color: var(--green);
      border-style: solid;
      background: rgba(76, 175, 125, 0.05);
    }

    .upload-item.has-file label { color: var(--green); }

    /* ===== STATUS ===== */
    .status-msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
      line-height: 1.5;
    }

    .status-msg.show { display: block; }
    .status-msg.sucesso { background: rgba(76,175,125,0.1); color: var(--green); border: 1px solid rgba(76,175,125,0.2); }
    .status-msg.erro    { background: rgba(224,85,85,0.1);  color: var(--red);   border: 1px solid rgba(224,85,85,0.2); }
    .status-msg.info    { background: rgba(76,143,224,0.1); color: var(--blue);  border: 1px solid rgba(76,143,224,0.2); }

    /* ===== SEÇÃO IMPORTAR ===== */
    #secaoImportar { display: none; }
    #secaoImportar.visivel { display: flex; flex-direction: column; gap: 14px; }

    /* ===== SEPARADOR ===== */
    .separador {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
    }

    .separador::before,
    .separador::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>

<body>

  <!-- TOPO -->
  <div class="topo">
    <div>
      <div class="topo-brand">AUG</div>
      <span class="topo-sub">Importador de Base</span>
    </div>
    <span class="topo-loja-badge" id="topoBadge"></span>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <!-- VERIFICAÇÃO DA LOJA -->
    <div class="card">
      <div class="card-titulo">🔍 Verificar Loja</div>
      <div class="input-group">
        <input
          type="text"
          id="inputSigla"
          placeholder="Sigla da loja (ex: AUG)"
          maxlength="10"
          autocomplete="off"
        >
        <input
          type="password"
          id="inputSenha"
          placeholder="Senha da loja"
          autocomplete="off"
        >
        <button class="btn btn-gold" id="btnVerificar">
          🔍 Verificar Loja
        </button>
      </div>
      <div class="status-msg" id="statusVerificar"></div>
    </div>

    <!-- INFO DA LOJA -->
    <div class="loja-info" id="lojaInfo">
      <div class="loja-info-icon">🏪</div>
      <div>
        <div class="loja-info-nome" id="lojaInfoNome"></div>
        <div class="loja-info-sigla" id="lojaInfoSigla"></div>
      </div>
    </div>

    <!-- SEÇÃO IMPORTAR -->
    <div id="secaoImportar">

      <div class="separador">Importação de Base</div>

      <!-- IMPORTAR ARQUIVOS -->
      <div class="card">
        <div class="card-titulo">⬆️ Enviar Arquivos</div>

        <div class="upload-area">
          <div class="upload-item" id="wrapProd">
            <input type="file" id="fileProd" accept=".txt">
            <label for="fileProd">
              <span class="upload-icon">📄</span>
              Produtos (.txt)
            </label>
          </div>
          <div class="upload-item" id="wrapGar">
            <input type="file" id="fileGar" accept=".txt">
            <label for="fileGar">
              <span class="upload-icon">🛡️</span>
              Garantias (.txt)
            </label>
          </div>
        </div>

        <button class="btn btn-green" id="btnImportar" disabled>
          ⬆️ Importar para Nuvem
        </button>

        <div class="status-msg" id="statusImportar"></div>
      </div>

      <!-- APAGAR BANCO -->
      <div class="card">
        <div class="card-titulo">🗑️ Apagar Banco</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5">
          Remove todos os produtos e garantias desta loja do banco de dados.
        </p>
        <button class="btn btn-danger" id="btnApagar">
          🗑️ Apagar Banco desta Loja
        </button>
        <div class="status-msg" id="statusApagar"></div>
      </div>

    </div>

  </div>

  <script type="module" src="../../src/js/importador.js"></script>

  <script>
    document.addEventListener('change', e => {
      if (e.target.type !== 'file') return;
      const wrap = e.target.closest('.upload-item');
      if (!wrap) return;
      const temArquivo = e.target.files.length > 0;
      wrap.classList.toggle('has-file', temArquivo);
      if (temArquivo) {
        const label = wrap.querySelector('label');
        const icon = label.querySelector('.upload-icon').outerHTML;
        label.innerHTML = icon + e.target.files[0].name;
      }
      const prod = document.getElementById('fileProd').files.length > 0;
      const gar  = document.getElementById('fileGar').files.length > 0;
      document.getElementById('btnImportar').disabled = !(prod && gar);
    });
  </script>

</body>
  </html>
